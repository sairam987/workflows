name: Issue & Comment Greeter

on:
  issues:
    types: [opened, edited, reopened, closed]
  issue_comment:
    types: [created, edited]

permissions:
  issues: write

jobs:
  greet:
    runs-on: ubuntu-latest

    steps:
      - name: Issue opened
        if: github.event_name == 'issues' && github.event.action == 'opened'
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.issue.number }}
          body: |
            👋 Hi @${{ github.event.issue.user.login }}!

            Thanks for opening this issue. A maintainer will review it soon.

      - name: Add labels to new issue
        if: github.event_name == 'issues' && github.event.action == 'opened'
        uses: actions-ecosystem/action-add-labels@v1
        with:
          labels: |
            new
            timeline:3d

      - name: Issue edited
        if: github.event_name == 'issues' && github.event.action == 'edited'
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.issue.number }}
          body: |
            ✏️ Thanks @${{ github.event.issue.user.login }} for updating this issue.

      - name: Issue reopened
        if: github.event_name == 'issues' && github.event.action == 'reopened'
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.issue.number }}
          body: |
            🔄 Thanks @${{ github.event.issue.user.login }} for reopening this issue.

            We'll take another look.

      - name: Issue closed
        if: github.event_name == 'issues' && github.event.action == 'closed'
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.issue.number }}
          body: |
            ✅ This issue has been closed.

            Thanks to everyone who participated!

      - name: Comment created
        if: github.event_name == 'issue_comment' && github.event.action == 'created'
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.issue.number }}
          body: |
            💬 Thanks @${{ github.event.comment.user.login }} for joining the discussion!

      - name: Comment edited
        if: github.event_name == 'issue_comment' && github.event.action == 'edited'
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.issue.number }}
          body: |
            ✏️ Thanks @${{ github.event.comment.user.login }} for updating your comment.
